<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raksha | Safe Route Finder</title>

    <!-- Leaflet CSS & JS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 🔥 Heatmap Plugin -->
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- 🔰 Raksha Header -->
    <header class="app-header">
      <div class="logo-container">
        <div class="shield-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="38"
            height="38"
            viewBox="0 0 24 24"
            fill="none"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"
            ></path>
          </svg>
        </div>
        <div class="title-text">
          <h1>Raksha</h1>
          <p class="subtitle">Smart Protection Device</p>
        </div>
      </div>
    </header>

    <h2 class="main-heading">Safe Route Finder</h2>

    <div class="input-container">
      <label for="hour">Time of Travel (0–23):</label>
      <input
        type="number"
        id="hour"
        min="0"
        max="23"
        placeholder="e.g., 22 for 10 PM"
      />

      <label for="source">Source:</label>
      <input type="text" id="source" value="Bandra" />

      <label for="destination">Destination:</label>
      <input type="text" id="destination" value="Dadar" />

      <button id="findRoute">Find Safe Routes</button>
    </div>

    <div id="map"></div>
    <div id="routes"></div>

    <div id="loadingOverlay">
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Fetching the safest routes for you...</div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
