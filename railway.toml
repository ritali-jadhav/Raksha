# Railway root-level config — points Railway to the Node.js backend subdirectory.
# This ensures Railway uses Raksha/ as the service root without requiring
# the "Root Directory" setting to be configured manually in the dashboard.

[build]
builder = "nixpacks"
buildCommand = "cd Raksha && npm install && npm run build"

[deploy]
startCommand = "cd Raksha && npm start"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
